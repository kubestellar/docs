name: PR Verifier

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions: read-all  # default read; writes scoped to job below

jobs:
  verify:
    permissions:
      checks: write
      pull-requests: read
    uses: kubestellar/infra/.github/workflows/reusable-pr-verifier.yml@main
    secrets: inherit
