name: OpenSSF Scorecard

on:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions: read-all  # default read; writes scoped to job below

jobs:
  analysis:
    permissions:
      security-events: write
      contents: read
      actions: read
      id-token: write
    uses: kubestellar/infra/.github/workflows/reusable-scorecard.yml@a160acca0bdce1ac6c649e006d680d5f6d53024e  # main
    secrets: inherit
