name: AI Fix with Copilot

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to assign to Copilot
        required: true
        type: string
  issues:
    types: [labeled]
  pull_request_target:
    types: [opened]

permissions: read-all  # default read; writes scoped to job below

jobs:
  ai-fix:
    # Fork guard: workflow_dispatch and issues events have no PR context (null check
    # passes them through); pull_request_target events from untrusted forks are blocked.
    if: >-
      github.event.pull_request == null ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: kubestellar/infra/.github/workflows/reusable-ai-fix.yml@a160acca0bdce1ac6c649e006d680d5f6d53024e  # pin: main
    with:
      issue_number: ${{ github.event.inputs.issue_number || '' }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
