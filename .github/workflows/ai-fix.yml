name: AI Fix with Copilot

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to assign to Copilot
        required: true
        type: string
  issues:
    types: [labeled]
  pull_request_target:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  ai-fix:
    # Fork guard: block pull_request_target from untrusted forks (pwn-request / CWE-829).
    # workflow_dispatch and issues events have no pull_request context, so the null
    # check allows them through. Only same-repo PRs reach the reusable workflow.
    if: >-
      github.event.pull_request == null ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: kubestellar/infra/.github/workflows/reusable-ai-fix.yml@a160acca0bdce1ac6c649e006d680d5f6d53024e  # pin: main
    with:
      issue_number: ${{ github.event.inputs.issue_number || '' }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
