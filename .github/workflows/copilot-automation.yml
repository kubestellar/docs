name: Copilot PR Automation

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to process
        required: true
        type: string
  pull_request_target:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: copilot-automation-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.sha }}
  cancel-in-progress: true

jobs:
  copilot-automation:
    # Fork guard: block pull_request_target from untrusted forks (pwn-request / CWE-829).
    # workflow_dispatch has no pull_request context, so the null check allows it through.
    # Only same-repo PRs reach the reusable workflow with write permissions.
    if: >-
      github.event.pull_request == null ||
      github.event.pull_request.head.repo.full_name == github.repository
    uses: kubestellar/infra/.github/workflows/reusable-copilot-automation.yml@a160acca0bdce1ac6c649e006d680d5f6d53024e  # pin: main
    with:
      pr_number: ${{ github.event.inputs.pr_number || '' }}
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
