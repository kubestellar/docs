name: Fuzz MDX Sanitizer

# Addresses: kubestellar/docs#6223
# Runs the mutation-based fuzz harness for sanitizeHtmlForMdx on a weekly
# schedule and on any PR that touches the sanitizer or this workflow.

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  pull_request:
    branches: [main]
    paths:
      - 'src/lib/sanitizeHtml.ts'
      - '.github/fuzzing/fuzz-mdx-sanitizer.ts'
      - '.github/workflows/fuzz-mdx.yml'
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of fuzz iterations'
        required: false
        default: '20000'
      seed:
        description: 'PRNG seed (leave empty for random)'
        required: false
        default: ''

permissions: {}  # no default permissions; this job needs no token access

jobs:
  fuzz:
    name: Fuzz sanitizeHtmlForMdx
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run fuzz harness
        run: |
          SEED_ARG=""
          if [ -n "${{ github.event.inputs.seed }}" ]; then
            SEED_ARG="--seed=${{ github.event.inputs.seed }}"
          fi
          npx tsx .github/fuzzing/fuzz-mdx-sanitizer.ts \
            --iterations=${{ github.event.inputs.iterations || '20000' }} \
            $SEED_ARG

      - name: Upload fuzz log on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-failure-log
          path: /tmp/fuzz-*.log
          if-no-files-found: ignore
          retention-days: 14
