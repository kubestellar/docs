name: MDX Sanitizer Fuzz Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/sanitizeHtml.ts'
      - 'src/__tests__/sanitize.test.ts'
      - '.github/workflows/mdx-sanitizer-fuzz.yml'
  pull_request:
    paths:
      - 'src/lib/sanitizeHtml.ts'
      - 'src/__tests__/sanitize.test.ts'
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC
  workflow_dispatch:

permissions: read-all

jobs:
  fuzz-test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run MDX sanitizer fuzz tests
        run: npm test -- sanitize.test.ts --reporter=verbose

      - name: Run sanitizer with extended test vectors
        run: |
          cat > .fuzz-vectors.js << 'EOF'
          // Extended fuzz test vectors for MDX sanitizer
          const vectors = [
            // XSS bypass attempts
            '<img src=x onerror="alert(1)">',
            '<svg onload=alert(1)>',
            '<iframe src="javascript:alert(1)">',
            '<object data="javascript:alert(1)">',
            '<embed src="javascript:alert(1)">',
            '<video src=x onerror=alert(1)>',
            '<audio src=x onerror=alert(1)>',
            '<marquee onstart=alert(1)>',
            '<isindex type=image src=1 onerror=alert(1)>',
            // Script tag variations
            '<SCRIPT>alert(1)</SCRIPT>',
            '<script>alert(1)</script >',
            '<script>\nalert(1)\n</script>',
            '< script>alert(1)</ script>',
            '<script\x00>alert(1)</script>',
            // Event handler bypasses
            '<div style="background:url(javascript:alert(1))">',
            '<a href="javascript:alert(1)">click</a>',
            '<form action="javascript:alert(1)">',
            // Comment-based attacks
            '<!--<script>alert(1)</script>-->',
            '<!---><script>alert(1)</script>',
            // Null byte and control char attacks
            '<scri\x00pt>alert(1)</script>',
            'safe<\x01script>attack</script>',
            // Unicode/encoding bypass
            '<script>alert(1)</script>',
            // Data URIs and protocols
            '<a href="data:text/html,<script>alert(1)</script>">',
            // Nested tag reconstruction
            '<scr<script>ipt>alert(1)</script>',
            '<im<img src=x onerror="alert(1)">g>',
          ];

          let passed = 0;
          let failed = 0;

          for (const vector of vectors) {
            try {
              const result = require('./src/lib/sanitizeHtml').sanitizeHtmlForMdx(vector);
              if (result.includes('alert') || result.includes('onerror') || result.includes('onload') || result.includes('javascript:')) {
                console.error(`FUZZ FAIL: ${vector} → ${result}`);
                failed++;
              } else {
                passed++;
              }
            } catch (e) {
              console.error(`FUZZ ERROR: ${vector} → ${e.message}`);
              failed++;
            }
          }

          console.log(`\nFuzz test results: ${passed} passed, ${failed} failed`);
          if (failed > 0) exit 1;
          EOF
          node .fuzz-vectors.js

      - name: Report test results
        if: always()
        run: echo "MDX sanitizer fuzz testing completed"
